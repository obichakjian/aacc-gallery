<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ann Arbor Civic Choru</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

.header {
  background: #1d4ed8;
  color: white;
  padding: 16px;
  text-align: center;
}

.header img {
  max-width: 180px;
  height: auto;
  display: block;
  margin: 0 auto 10px;
}

.header span {
  display: block;
  font-size: 24px;
  font-weight: bold;
  line-height: 1.2;
}

.controls {
  padding: 12px;
  background: white;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

input, select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

.tabs {
  margin-top: 10px;
  width: 100%;
  overflow-x: auto;
  white-space: nowrap;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}

.tab {
  padding: 10px 14px;
  margin: 4px 6px 4px 0;
  border: none;
  background: #e5e7eb;
  cursor: pointer;
  border-radius: 20px;
  font-size: 14px;
  display: inline-block;
}

.tab.active {
  background: #1d4ed8;
  color: white;
}

.summary {
  padding: 10px 12px;
  background: white;
  color: #555;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 280px;
  object-fit: certain;
  display: block;
}

.section-title {
  margin: 0;
  padding: 10px 15px;
  font-size: 20px;
}

@media (max-width: 768px) {
  .controls {
    flex-direction: column;
    align-items: stretch;
  }

  input, select {
    width: 100%;
  }

  .summary {
    flex-direction: column;
    align-items: flex-start;
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 8px;
  }

  .section-title {
    padding: 10px 12px;
    font-size: 18px;
  }
}

@media (max-width: 480px) {
  .header {
    padding: 14px;
  }

  .header img {
    max-width: 140px;
  }

  .header span {
    font-size: 20px;
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .tab {
    font-size: 13px;
    padding: 9px 12px;
  }
}
</style>
</head>
<body>

<div class="header">
  <img src="AACC_logo.png" alt="AACC Logo">
  <span>Ann Arbor Civic Chorus</span>
</div>

<div class="controls">
  <input id="search" placeholder="Search name or voice part">

  <select id="sortMode">
    <option value="section">Voice parts</option>
    <option value="az">A–Z</option>
    <option value="za">Z–A</option>
  </select>

  <select id="showRoles">
    <option value="show">Show Director/Pianist</option>
    <option value="hide">Hide Director/Pianist</option>
  </select>

  <div id="tabs" class="tabs"></div>
</div>

<div class="summary">
  <div id="status">Loading...</div>
  <div id="count"></div>
</div>

<div id="gallery"></div>

<script>
let members = [];
let filtered = [];
let currentFilter = "All";

fetch("members.json")
  .then(res => {
    if (!res.ok) {
      throw new Error("Could not load members.json");
    }
    return res.json();
  })
  .then(data => {
    members = data;
    document.getElementById("status").textContent = members.length + " members";
    buildTabs();
    render();
  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").textContent = "Error loading members.json";
  });

function buildTabs() {
  const order = [
    "All",
    "Soprano 1", "Soprano 2",
    "Alto 1", "Alto 2",
    "Tenor 1", "Tenor 2",
    "Bass 1", "Bass 2",
    "Baritone",
    "Director", "Pianist"
  ];

  const parts = order.filter(p => p === "All" || members.some(m => m.voicepart === p));
  const tabs = document.getElementById("tabs");

  tabs.innerHTML = parts.map(p =>
    `<button class="tab ${p === 'All' ? 'active' : ''}" data-part="${p}">${p}</button>`
  ).join("");

  tabs.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      currentFilter = btn.dataset.part;
      tabs.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      render();
    });
  });
}

function getLastName(name) {
  return (name || "").trim().split(/\s+/).pop().toLowerCase();
}

function render() {
  const term = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sortMode").value;
  const showRoles = document.getElementById("showRoles").value;

  filtered = members.filter(m => {
    if (showRoles === "hide" && (m.voicepart === "Director" || m.voicepart === "Pianist")) {
      return false;
    }

    return (
      ((m.name || "").toLowerCase().includes(term) ||
       (m.voicepart || "").toLowerCase().includes(term)) &&
      (currentFilter === "All" || m.voicepart === currentFilter)
    );
  });

  document.getElementById("count").textContent = filtered.length + " shown";

  if (sort === "section") {
    renderGrouped();
  } else {
    const sorted = [...filtered].sort((a, b) => {
      const result = getLastName(a.name).localeCompare(getLastName(b.name));
      return sort === "za" ? -result : result;
    });

    document.getElementById("gallery").innerHTML = `
      <div class="grid">
        ${sorted.map(m => card(m)).join("")}
      </div>
    `;
  }
}

function renderGrouped() {
  const order = [
    "Soprano 1", "Soprano 2",
    "Alto 1", "Alto 2",
    "Tenor 1", "Tenor 2",
    "Bass 1", "Bass 2",
    "Baritone",
    "Director", "Pianist"
  ];

  const parts = order.filter(p => filtered.some(m => m.voicepart === p));

  document.getElementById("gallery").innerHTML = parts.map(p => {
    const list = filtered.filter(m => m.voicepart === p);
    return `
      <h3 class="section-title">${p} (${list.length})</h3>
      <div class="grid">
        ${list.map(m => card(m)).join("")}
      </div>
    `;
  }).join("");
}

function card(m) {
  return `<div class="card">
    <img src="${m.image}" alt="${m.name}">
  </div>`;
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("sortMode").addEventListener("change", render);
document.getElementById("showRoles").addEventListener("change", render);
</script>

</body>
</html>
