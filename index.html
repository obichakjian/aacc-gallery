<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

.header {
  background:#1d4ed8;
  color:white;
  padding:20px;
  text-align:center;
}

.controls {
  padding:15px;
  background:white;
}

input {
  padding:10px;
  width:100%;
  max-width:300px;
}

.tabs {
  margin-top:10px;
}

.tab {
  padding:8px 12px;
  margin:4px;
  border:none;
  background:#e5e7eb;
  cursor:pointer;
  border-radius:20px;
}

.tab.active {
  background:#1d4ed8;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
}

.lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>
<body>

<div class="header">
<h2>AACC Member Gallery</h2>
</div>

<div class="controls">
<input id="search" placeholder="Search name or voice part">

<div id="tabs" class="tabs"></div>
</div>

<div id="gallery" class="grid"></div>

<div id="lightbox" class="lightbox">
  <img id="lightboxImg">
</div>

<script>
let members = [];
let currentFilter = "All";

fetch("members.json")
.then(res => res.json())
.then(data => {
  members = data;
  buildTabs();
  render();
});

function buildTabs(){
  const parts = ["All", ...new Set(members.map(m=>m.voicepart))];
  const tabs = document.getElementById("tabs");

  tabs.innerHTML = parts.map(p =>
    `<button class="tab ${p==='All'?'active':''}" onclick="setFilter('${p}',this)">${p}</button>`
  ).join("");
}

function setFilter(part,btn){
  currentFilter = part;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  render();
}

document.getElementById("search").addEventListener("input", render);

function render(){
  const term = document.getElementById("search").value.toLowerCase();

  const list = members.filter(m=>{
    return (
      (m.name.toLowerCase().includes(term) ||
       m.voicepart.toLowerCase().includes(term)) &&
      (currentFilter==="All" || m.voicepart===currentFilter)
    );
  });

  document.getElementById("gallery").innerHTML =
    list.map(m=>`
      <div class="card" onclick="openImage('${m.image}')">
        <img src="${m.image}">
      </div>
    `).join("");
}

function openImage(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxImg").src = src;
}

document.getElementById("lightbox").onclick = ()=>{
  document.getElementById("lightbox").style.display="none";
};
</script>

</body>
</html>
