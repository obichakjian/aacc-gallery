<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AACC Member Gallery</title>
<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

.header {
  background:#1d4ed8;
  color:white;
  padding:20px;
  text-align:center;
}

.controls {
  padding:15px;
  background:white;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.tabs {
  margin-top:10px;
}

.tab {
  padding:8px 12px;
  margin:4px;
  border:none;
  background:#e5e7eb;
  cursor:pointer;
  border-radius:20px;
}

.tab.active {
  background:#1d4ed8;
  color:white;
}

.summary {
  padding:10px 15px;
  background:white;
  color:#555;
  display:flex;
  justify-content:space-between;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:white;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  display:block;
}

.lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}
</style>
</head>
<body>

<div class="header">
<h2>AACC Member Gallery</h2>
</div>

<div class="controls">
<input id="search" placeholder="Search name or voice part">

<select id="sortMode">
  <option value="section">Grouped</option>
  <option value="az">A–Z</option>
  <option value="za">Z–A</option>
</select>

<select id="showRoles">
  <option value="show">Show Director/Pianist</option>
  <option value="hide">Hide Director/Pianist</option>
</select>

<div id="tabs" class="tabs"></div>
</div>

<div class="summary">
  <div id="status">Loading...</div>
  <div id="count"></div>
</div>

<div id="gallery"></div>

<div id="lightbox" class="lightbox">
  <img id="lightboxImg">
</div>

<script>
let members = [];
let filtered = [];
let currentFilter = "All";

fetch("members.json")
.then(res => res.json())
.then(data => {
  members = data;
  document.getElementById("status").textContent = members.length + " members";
  buildTabs();
  render();
});

function buildTabs(){
  const parts = ["All", ...new Set(members.map(m=>m.voicepart))];
  const tabs = document.getElementById("tabs");

  tabs.innerHTML = parts.map(p =>
    `<button class="tab ${p==='All'?'active':''}" onclick="setFilter('${p}',this)">${p}</button>`
  ).join("");
}

function setFilter(part,btn){
  currentFilter = part;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  render();
}

function getLastName(name){
  return name.split(" ").pop().toLowerCase();
}

function render(){
  const term = document.getElementById("search").value.toLowerCase();
  const sort = document.getElementById("sortMode").value;
  const showRoles = document.getElementById("showRoles").value;

  filtered = members.filter(m=>{
    if(showRoles === "hide" && (m.voicepart === "Director" || m.voicepart === "Pianist")) return false;

    return (
      (m.name.toLowerCase().includes(term) ||
       m.voicepart.toLowerCase().includes(term)) &&
      (currentFilter === "All" || m.voicepart === currentFilter)
    );
  });

  document.getElementById("count").textContent = filtered.length + " shown";

  if(sort === "section"){
    renderGrouped();
  } else {
    const sorted = [...filtered].sort((a,b)=>{
      const res = getLastName(a.name).localeCompare(getLastName(b.name));
      return sort === "za" ? -res : res;
    });

    document.getElementById("gallery").innerHTML = `
      <div class="grid">
        ${sorted.map(m=>card(m)).join("")}
      </div>`;
  }
}

function renderGrouped(){
  const order = [
    "Soprano 1","Soprano 2",
    "Alto 1","Alto 2",
    "Tenor 1","Tenor 2",
    "Bass 1","Bass 2",
    "Baritone",
    "Director","Pianist"
  ];

  const parts = order.filter(p => filtered.some(m => m.voicepart === p));

  document.getElementById("gallery").innerHTML = parts.map(p=>{
    const list = filtered.filter(m=>m.voicepart===p);
    return `
      <h3 style="padding:10px 15px">${p} (${list.length})</h3>
      <div class="grid">
        ${list.map(m=>card(m)).join("")}
      </div>
    `;
  }).join("");
} (${list.length})</h3>
      <div class="grid">
        ${list.map(m=>card(m)).join("")}
      </div>
    `;
  }).join("");
} (${list.length})</h3>
      <div class="grid">
        ${list.map(m=>card(m)).join("")}
      </div>
    `;
  }).join("");
}

function card(m){
  return `<div class="card" onclick="openImage('${m.image}')">
    <img src="${m.image}">
  </div>`;
}

function openImage(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxImg").src = src;
}


};

document.getElementById("search").addEventListener("input", render);
document.getElementById("sortMode").addEventListener("change", render);
document.getElementById("showRoles").addEventListener("change", render);
</script>

</body>
</html>
